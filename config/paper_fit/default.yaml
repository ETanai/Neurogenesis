# Optional quality-growth objective used to compare MNIST paper-reproduction runs.
enabled: false

quality:
  metric_layer: 3
  normalize_min: 0.02
  normalize_max: 0.08
  clamp: true

growth:
  # Paper-inspired target bands for final encoder layer sizes (L1..L4).
  target_bands:
    - [220, 250]
    - [115, 145]
    - [80, 95]
    - [30, 45]
  normalize: band_width      # band_width|upper
  clamp_per_level: 1.0

growth_shape:
  enabled: true
  # Target relative late-vs-early growth pressure (late growth should be smaller than early growth).
  late_early_ratio_target: 0.6
  early_window: 3
  late_window: 3
  # Soft budget for total cumulative growth across all encoder levels.
  max_total_growth: 4500
  # Additional penalty contribution in the overall paper-fit score.
  weight: 0.25

weights:
  quality: 0.6
  growth: 0.4

quality_first:
  quality_weight: 0.75
  growth_weight: 0.15
  growth_shape_weight: 0.10
  quality_floor: 0.035
  quality_floor_penalty: 0.2

pareto:
  enabled: true
