mlflow:
  enabled: true                       # flip off when MLflow server is unavailable
  tracking_uri: http://127.0.0.1:5000 # address of the tracking server
  experiment_name: neurogenesis-paper # groups runs for paper replication
  run_name: ${now:%Y%m%d_%H%M%S}      # timestamped run names to avoid collisions
  metric_filter:
    include_prefixes:                # optional whitelist: only log metrics with these prefixes.
      - pretrain/
      - threshold/
      - summary/
      - metrics/
      - plasticity/
      - stability/
      - class_
      - diagnostics/
      - replay/
      - stats/
    exclude_prefixes: []              # optional blacklist evaluated when include_prefixes is null.
    class_metrics: summary            # full | summary | off
ir_quality_samples_per_class: 64      # samples per class for intrinsic replay quality diagnostics
ir_nn_samples_per_class: 256          # clean samples used for IR nearest-neighbor diagnostics
