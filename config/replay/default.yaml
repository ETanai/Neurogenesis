# Replay configuration shared across experiments.
enabled: true                   # disable to turn replay off entirely
mode: dataset                   # intrinsic (decoder-based) or dataset (stored real samples)
cov_eps: 1.0e-4                 # numerical epsilon added when inverting covariances
ir_sampling_mode: gaussian_full # gaussian_full, gaussian_diag, gaussian_shrink, mean_plus_noise, mean_only
ir_cov_shrinkage: 0.0           # for gaussian_shrink: 0=full covariance, 1=diagonal
ir_noise_scale: 1.0             # scales latent noise for intrinsic replay sampling
ir_filter_mode: none            # none, latent_percentile, roundtrip_percentile, recon_error_match
ir_filter_percentile: 0.95      # percentile cutoff used by IR filters
ir_filter_max_resample: 10      # resampling rounds before falling back to unfiltered samples
stats_batch_size: 4096           # number of real samples to estimate replay statistics
batch_ratio: 2.0                # replay mini-batches vs. real batches (1.0 = 50/50)
sampling_mode: ratio            # ratio or paper; paper samples from every previous class
per_class_batch_ratio: 1.0      # for sampling_mode=paper, samples per previous class vs. real batch
dataset_max_samples_per_class: null   # limit stored samples per class for dataset replay
dataset_storage_device: cpu           # device holding dataset replay tensors
reuse_previous_stats: false           # reuse old per-class stats when adding new classes
