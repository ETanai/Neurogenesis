description: "SD-19 NDL growth over 20 randomly ordered letter curricula (Figure 8 protocol)."
repetitions: 20
seed:
  base: 42
  strategy: sequential

mlflow:
  experiment_name: neurogenesis-paper-sd19-growth-20
  run_name_prefix: sd19_growth

runs:
  - name: ndl_dataset
    description: "SD-19 neurogenesis with clean dataset replay and shuffled letters."
    shuffle_incremental_classes: true
    overrides:
      - data=sd19
      - experiment=sd19_incremental
      - model.hidden_sizes=[1000,500,250,50]
      - experiment.regime=ndl
      - replay.enabled=true
      - replay.mode=dataset
      - neurogenesis.thresholds=null
      - neurogenesis.objective_mode=paper_level_ae
      - neurogenesis.next_layer_optimization=paper_columns
      - neurogenesis.stability_replay_mode=paper
      - neurogenesis.early_stop=null
      - neurogenesis.unresolved_outlier_action=error
