description: "SD-19 neurogenesis with dataset replay (no intrinsic replay)."
repetitions: 1
seed:
  base: 42
  strategy: sequential

mlflow:
  experiment_name: neurogenesis-paper-sd19-ndl
  run_name_prefix: sd19_ndl

runs:
  - name: ndl
    description: "SD-19 neurogenesis using dataset replay buffer."
    overrides:
      - data=sd19
      - experiment=sd19_incremental
      - experiment.regime=ndl
      - replay.enabled=true
      - replay.mode=dataset
      - neurogenesis.thresholds=null
      - neurogenesis.objective_mode=paper_level_ae
      - neurogenesis.next_layer_optimization=paper_columns
      - neurogenesis.stability_replay_mode=paper
      - neurogenesis.early_stop=null
      - neurogenesis.unresolved_outlier_action=error
