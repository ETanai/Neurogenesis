      - data=mnist
      - experiment=mnist_incremental
      - neurogenesis=paper_mnist
      - experiment.regime=ndl_ir
      - replay.enabled=true
      - replay.mode=dataset
      - training.pretrain_mode=stacked
      - training.stacked_level_epochs=50
      - training.pretrain_denoising.enabled=true
      - neurogenesis.max_nodes=[50,45,35,20]
      - neurogenesis.max_outliers_mode=fraction
      - neurogenesis.max_outlier_fraction=0.03
      - neurogenesis.factor_new_nodes=0.003
