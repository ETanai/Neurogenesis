description: "MNIST paper-gap closure sweep balancing reconstruction quality and bounded growth."
repetitions: 1
enforce_paper_fidelity: false
set_paper_experiment_tag: false

seed:
  base: 42
  strategy: sequential

mlflow:
  experiment_name: mnist-paperfit-balanced
  tracking_uri: sqlite:////workspace/Neurogenesis/mlflow.db
  run_name_prefix: paperfit_bal

