# Optimization schedule shared across experiments.
pretrain_epochs: 14        # epochs dedicated to fitting the base classes
pretrain_mode: stacked_denoising  # paper-style layer-wise stacked denoising AE
denoising_dropout: 0.1     # input dropout used during stacked denoising pretraining
denoising_std: 0.0         # optional additive Gaussian noise during denoising pretraining
pretrain_finetune_epochs: 0 # optional end-to-end fine-tuning after stacked pretraining
base_lr: 0.0001             # Adam learning rate
weight_decay: 0.0          # set >0 to regularize large weights
device: auto               # torch.device string; auto|cpu|cuda|cuda:0|mps are typical choices.
validate: true             # run validation after each epoch
incremental_epochs: 5      # epochs spent learning each incremental class batch
incremental_optimizer: backprop # backprop or predictive_coding (research extension)
predictive_coding:
  inference_steps: 5       # hidden-state relaxation iterations per batch
  inference_lr: 0.1        # activity-state step size; separate from the weight LR
  plasticity_mode: uniform # uniform or usage-dependent post-synaptic step scaling
  usage_decay: 0.99        # EMA decay for absolute neuron activity
  usage_exponent: 0.5      # inverse-usage strength
  plasticity_min: 0.25     # lower bound after mean-one normalization
  plasticity_max: 4.0      # upper bound after mean-one normalization
  layer_precisions: null   # one positive weight per encoder/decoder affine layer
  global_loss_weight: 0.0  # optional weak end-to-end reconstruction term
  update_mode: local       # local or backprop_equivalent pipeline control
  consolidation_epochs: 0 # optional BP reconstruction epochs after local acquisition
  consolidation_lr_ratio: 1.0 # consolidation LR relative to PC weight LR
log_pretrain_thresholds: true  # log per-epoch threshold estimates during pretraining
base_checkpoint: null      # optional pretrained NGAutoEncoder checkpoint to load
base_checkpoint_out: null  # optional path where a newly pretrained base model is saved
incremental_checkpoint: null      # optional completed-class checkpoint to resume
incremental_checkpoint_out: null  # atomically overwritten after every completed class
