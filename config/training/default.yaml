# Optimization schedule shared across experiments.
pretrain_epochs: 14        # epochs dedicated to fitting the base classes
pretrain_mode: joint       # joint|stacked (paper-style layer-wise pretraining)
stacked_level_epochs: null # if set, overrides per-level epochs when pretrain_mode=stacked
base_lr: 0.0001             # Adam learning rate
weight_decay: 0.0          # set >0 to regularize large weights
device: auto               # torch.device string; auto|cpu|cuda|cuda:0|mps are typical choices.
validate: true             # run validation after each epoch
incremental_epochs: 5      # epochs spent learning each incremental class batch
pretrain_batch_mode: minibatch  # minibatch|full_class for base pretraining
incremental_batch_mode: minibatch  # minibatch|full_class for incremental class learning
log_pretrain_thresholds: true  # log per-epoch threshold estimates during pretraining

pretrain_denoising:
  enabled: false           # set true for stacked denoising pretraining
  noise_type: gaussian     # gaussian|mask
  noise_std: 0.2           # std for gaussian noise when enabled
  mask_prob: 0.2           # masking probability when noise_type=mask
